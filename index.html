<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Tracker Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="f1-header">
        <div class="header-content">
            <span class="live-dot"></span>
            <h1>F1 RACING HUB</h1>
            <p>Live 2026 Season Driver Standings & Session Schedule</p>
        </div>
    </header>

    <main class="dashboard-container">
        <section id="next-race-banner" class="session-banner">
            <h2>LOADING NEXT GRAND PRIX...</h2>
            <div id="race-time-display" class="time-pill">--:-- --</div>
        </section>

        <section class="grid-section">
            <h2>Driver Standings Grid</h2>
            <div id="driver-grid" class="f1-grid-container">
                <div class="loading-spinner">Fetching live grid data...</div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
